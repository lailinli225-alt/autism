name: Refresh autism articles

on:
  schedule:
    - cron: "20 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: autism-support-prototype/scripts/requirements.txt

      - name: Install scraper dependencies
        working-directory: autism-support-prototype
        run: pip install -r scripts/requirements.txt

      - name: Refresh recent articles
        working-directory: autism-support-prototype
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY is not configured; keeping the current reviewed index."
            exit 0
          fi
          python scripts/scrape_articles.py --limit 100
          python scripts/enrich_articles.py

      - name: Commit refreshed index
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add autism-support-prototype/src/data/articles.json autism-support-prototype/docs/article-sources.md
          git commit -m "Refresh autism article index"
          git push
