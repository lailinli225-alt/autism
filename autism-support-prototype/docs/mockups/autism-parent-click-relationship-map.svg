    <text x="1183" y="42" class="tag">可执行</text>
    <rect x="1264" y="20" width="90" height="34" rx="17" fill="#FFF4E4"/>
    <text x="1287" y="42" class="tag">可记录</text>
    <rect x="1368" y="20" width="118" height="34" rx="17" fill="#EAF4FC"/>
    <text x="1391" y="42" class="tag">可追溯</text>
