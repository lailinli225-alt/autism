<svg width="1680" height="1180" viewBox="0 0 1680 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="840" y1="0" x2="840" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFCF8"/>
      <stop offset="1" stop-color="#F4F8EF"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2A492D" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#5F9A56" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#4A8CC7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#E49336" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .h1 { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 34px; font-weight: 800; fill: #172018; }
      .h2 { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 21px; font-weight: 780; fill: #172018; }
      .h3 { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; font-weight: 760; fill: #1E2B22; }
      .body { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; font-weight: 500; fill: #4C5B50; }
      .small { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 12px; font-weight: 560; fill: #6B756C; }
      .tag { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 12px; font-weight: 760; fill: #315D35; }
      .step { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; font-weight: 780; fill: #FFFFFF; }
      .nav { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; font-weight: 720; fill: #345F38; }
    </style>
