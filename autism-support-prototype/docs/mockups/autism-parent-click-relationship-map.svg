      <path d="M132 15H174" stroke="#5F9A56" stroke-width="2.4" marker-end="url(#arrow)"/>
      <rect x="194" y="0" width="116" height="30" rx="15" fill="#EAF4FC"/>
      <text x="220" y="20" class="tag">数据流</text>
      <path d="M326 15H368" stroke="#4A8CC7" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
    </g>
  </g>

