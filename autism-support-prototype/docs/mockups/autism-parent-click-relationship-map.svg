    <path d="M18 32C18 25.4 23.4 20 30 20C36.6 20 42 25.4 42 32C42 39.3 30 47 30 47C30 47 18 39.3 18 32Z" stroke="#3F873F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 23V17" stroke="#E49336" stroke-width="3" stroke-linecap="round"/>
    <text x="78" y="26" class="h1">自闭症家长辅导产品 · 页面层级与点击关系图</text>
    <text x="78" y="55" class="body">基于你的白板原型优化：明确注册、主页、五大模块、深度页面、数据写入与返回路径。</text>
    <g transform="translate(1230 8)">
      <rect x="0" y="0" width="116" height="30" rx="15" fill="#EAF5E4"/>
